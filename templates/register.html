{% extends "base.html" %}
{% block title %}
Register - ShopSphere
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">
                    Create Account
                </h2>
                <p class="text-center text-muted">
                    Join ShopSphere Marketplace
                </p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            Full Name
                        </label>
                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Enter your name"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Email Address
                        </label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter your email"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Create password"
                               required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">
                            Account Type
                        </label>
                        <select name="role"
                                class="form-select"
                                required>
                            <option value="customer">
                                Customer
                            </option>
                            <option value="vendor">
                                Vendor
                            </option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-success btn-lg">
                            Create Account
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center">
                    Already have an account?
                    <a href="{{ url_for('login') }}">
                        Login Here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
