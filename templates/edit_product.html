{% extends "base.html" %}
{% block title %}
Edit Product - ShopSphere
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">
                    Edit Product
                </h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            Product Name
                        </label>
                        <input type="text"
                               name="name"
                               class="form-control"
                               value="{{ product.name }}"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Category
                        </label>
                        <select name="category"
                                class="form-select"
                                required>

                            <option value="Electronics"
                            {% if product.category == 'Electronics' %}selected{% endif %}>
                                Electronics
                            </option>

                            <option value="Fashion"
                            {% if product.category == 'Fashion' %}selected{% endif %}>
                                Fashion
                            </option>
                            <option value="Books"
                            {% if product.category == 'Books' %}selected{% endif %}>
                                Books
                            </option>
                            <option value="Home"
                            {% if product.category == 'Home' %}selected{% endif %}>
                                Home
                            </option>
                            <option value="Sports"
                            {% if product.category == 'Sports' %}selected{% endif %}>
                                Sports
                            </option>
                            <option value="Beauty"
                            {% if product.category == 'Beauty' %}selected{% endif %}>
                                Beauty
                            </option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">
                                    Price (₹)
                                </label>
                                <input type="number"
                                       step="0.01"
                                       name="price"
                                       class="form-control"
                                       value="{{ product.price }}"
                                       required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">
                                    Stock Quantity
                                </label>
                                <input type="number"
                                       name="stock"
                                       class="form-control"
                                       value="{{ product.stock }}"
                                       required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Product Image URL
                        </label>
                        <input type="url"
                               name="image_url"
                               class="form-control"
                               value="{{ product.image_url }}"
                               required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">
                            Product Description
                        </label>
                        <textarea name="description"
                                  rows="6"
                                  class="form-control"
                                  required>{{ product.description }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('vendor_dashboard') }}"
                           class="btn btn-secondary">
                            Cancel
                        </a>
                        <button type="submit"
                                class="btn btn-primary">
                            Update Product
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
