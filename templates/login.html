{% extends "base.html" %}
{% block title %}
Login - ShopSphere
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">
                    Welcome Back
                </h2>
                <p class="text-center text-muted">
                    Login to continue shopping
                </p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            Email Address
                        </label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               required>
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg">
                            Login
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center">
                    Don't have an account?
                    <a href="{{ url_for('register') }}">
                        Register Here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
